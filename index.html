    border:1px solid var(--card-border);
    border-radius:6px;
    margin-bottom:14px;
    overflow:hidden;
  }
  .card-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 16px;
    cursor:pointer;
    user-select:none;
  }
  .card-head:hover{background:#20242c;}
  .card-title{
    display:flex;
    align-items:baseline;
    gap:10px;
    min-width:0;
  }
  .num{
    color:var(--gold);
    font-weight:700;
    flex-shrink:0;
    font-size:0.85rem;
  }
  .desc{
    color:var(--paper);
    font-size:0.85rem;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .actions{
    display:flex;
    align-items:center;
    gap:8px;
    flex-shrink:0;
  }
  .copy-btn{
    background:transparent;
    border:1px solid var(--gold-dim);
    color:var(--gold);
    padding:6px 12px;
    border-radius:4px;
    font-size:0.75rem;
    font-family:inherit;
    cursor:pointer;
    transition:background 0.15s,color 0.15s;
    white-space:nowrap;
  }
  .copy-btn:hover{background:var(--gold);color:#1a1a1a;}
  .copy-btn.copied{background:var(--green);border-color:var(--green);color:#0d0d0d;}
  .chev{
    color:#666;
    font-size:0.7rem;
    transition:transform 0.15s;
    flex-shrink:0;
  }
  .card.open .chev{transform:rotate(90deg);}
  .card-body{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.2s ease;
    border-top:1px solid transparent;
  }
  .card.open .card-body{
    max-height:2000px;
    border-top:1px solid var(--card-border);
  }
  pre{
    margin:0;
    padding:14px 16px;
    font-size:0.78rem;
    line-height:1.5;
    color:#cfd2d8;
    overflow-x:auto;
    white-space:pre;
  }

    text-align:center;
    color:#5a5d66;
    font-size:0.72rem;

{title:"Sample Abstract/Summary document", code:`\\documentclass[12pt,a4paper]{article}

\\usepackage[a4paper,margin=1in]{geometry}

\\title{\\textbf{COVID-19 and Comobid}}
\\author{AI in Medical Field}
\\date{}

\\begin{center}
    \\Large\\textbf{Abstract}
\\end{center}

\\noindent
The COVID-19 pandemic has created unprecedented challenges worldwide. Artificial intelligence (AI) technologies hold tremendous potential for tackling key aspects of pandemic management and response. In the present review, we discuss the tremendous possibilities of AI technology in addressing the global challenges posed by the COVID-19 pandemic. First, we outline the multiple impacts of the current pandemic on public health, the economy, and society.

Next, we focus on the innovative applications of advanced AI technologies in key areas such as COVID-19 prediction, detection, control, and drug discovery for treatment. Specifically, AI-based predictive analytics models can use clinical, epidemiological, and omics data to forecast disease spread and patient outcomes. Additionally, deep neural networks enable rapid diagnosis through medical imaging.

Intelligent systems can support risk assessment, decision-making, and social sensing, thereby improving epidemic control and public health policies. Furthermore, high-throughput virtual screening enables AI to accelerate the identification of therapeutic drug candidates and opportunities for drug repurposing.

Finally, we discuss future research directions for AI technology in combating COVID-19, emphasizing the importance of interdisciplinary collaboration. Though promising, barriers related to model generalization, data quality, infrastructure readiness, and ethical risks must be addressed to fully translate these innovations into real-world impacts. Multidisciplinary collaboration engaging diverse expertise and stakeholders is imperative for developing robust, responsible, and human-centered AI solutions against COVID-19 and future public health emergencies.

\\vspace{0.3cm}

\\noindent
\\textbf{Keywords:} Artificial Intelligence, COVID-19, Diagnosis, Prognosis Evaluation, Epidemic Prediction, Drug Discovery.

{title:"Algorithm presentation — Bubble Sort", code:`\\documentclass[12pt,a4paper]{article}

\\usepackage{algorithm}
\\usepackage{algpseudocode}

\\begin{document}

\\begin{algorithm}
\\caption{Bubble Sort}

\\begin{algorithmic}[1]

\\Procedure{BubbleSort}{$A,n$}

\\For{$i \\gets 0$ to $n-1$}
    \\For{$j \\gets 0$ to $n-1-i$}
        \\If{$A[j] > A[j+1]$}
            \\State Swap $A[j]$ and $A[j+1]$
        \\EndIf
    \\EndFor
\\EndFor

\\EndProcedure

\\end{algorithmic}

\\end{algorithm}

\\end{document}`},

const list = document.getElementById('list');

programs.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';

  const head = document.createElement('div');
  head.className = 'card-head';
  head.innerHTML = `
    <div class="card-title">
      <span class="num">P${i+1}</span>
      <span class="desc">${p.title}</span>
    </div>
    <div class="actions">
      <button class="copy-btn">Copy</button>
      <span class="chev">▶</span>
    </div>
  `;

  const body = document.createElement('div');
  body.className = 'card-body';
  const pre = document.createElement('pre');
  pre.textContent = p.code;
  body.appendChild(pre);

  head.querySelector('.card-title').addEventListener('click', () => {
    card.classList.toggle('open');
  });
  head.querySelector('.chev').addEventListener('click', () => {
    card.classList.toggle('open');
  });

  const btn = head.querySelector('.copy-btn');
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(p.code).then(() => {
      btn.textContent = 'Copied ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 1200);
    });
  });

  card.appendChild(head);
  card.appendChild(body);
  list.appendChild(card);
});
</script>
